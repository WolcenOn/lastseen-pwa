<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b1220" />
    <title>LastSeen</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/assets/icons/icon.svg" />
    <link rel="stylesheet" href="/assets/css/app.css" />
  </head>
  <body>
    <main class="hero">
      <section class="card">
        <p class="eyebrow">PWA efímera · sin registro · sin base de datos</p>
        <h1>LastSeen</h1>
        <p>Salas temporales para compartir ubicación en grupo durante eventos, fiestas o salidas nocturnas.</p>

        <label for="room-name">Nombre de la sala</label>
        <div class="inline-field">
          <input id="room-name" maxlength="36" placeholder="Ej. Cuadrilla San Fermín" />
          <button id="random-room-name" class="icon-button" type="button" aria-label="Generar nombre aleatorio">🎲</button>
        </div>
        <small>Déjalo vacío y LastSeen generará un nombre corto y memorable.</small>

        <button id="create-room" type="button">Crear sala segura</button>
        <p id="status" class="status" aria-live="polite"></p>
      </section>
    </main>

    <script type="module" src="/src/app.js"></script>
  </body>
</html>
