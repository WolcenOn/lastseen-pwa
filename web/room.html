<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b1220" />
    <title>Sala | LastSeen</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/assets/icons/icon.svg" />
    <link rel="stylesheet" href="/assets/css/app.css" />
  </head>
  <body>
    <main class="room-shell">
      <section class="card room-header">
        <p class="eyebrow">Sala efímera</p>
        <h1 id="room-title">LastSeen</h1>
        <p id="room-link" class="mono"></p>
        <div class="button-grid">
          <button id="copy-link" type="button" class="secondary">Copiar enlace</button>
          <button id="share-link" type="button" class="secondary">Compartir</button>
        </div>
      </section>

      <section class="card" id="join-card">
        <h2>Tu identidad temporal</h2>
        <p>Elige un mote, un avatar y un PIN privado para poder cerrar tu conexión de forma forzada.</p>

        <label for="nickname">Mote</label>
        <input id="nickname" autocomplete="nickname" maxlength="24" placeholder="Tu mote" />

        <label for="pin">PIN privado</label>
        <div class="inline-field">
          <input id="pin" inputmode="numeric" maxlength="8" placeholder="4-8 números" />
          <button id="random-pin" class="icon-button" type="button" aria-label="Generar PIN">🔐</button>
        </div>

        <label>Avatar</label>
        <div id="avatar-picker" class="avatar-picker" role="radiogroup" aria-label="Elegir avatar"></div>

        <button id="join-room" type="button">Compartir ubicación</button>
        <p id="status" class="status" aria-live="polite"></p>
      </section>

      <section class="card" id="room-card" hidden>
        <div class="room-actions">
          <div>
            <h2>Grupo</h2>
            <p id="room-status" class="status" aria-live="polite"></p>
          </div>
          <button id="leave-room" type="button" class="danger">Salir</button>
        </div>
        <div id="members" class="member-list"></div>
      </section>
    </main>

    <script type="module" src="/src/app.js"></script>
  </body>
</html>
