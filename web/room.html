<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b1220" />
    <title>Sala | LastSeen</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/assets/icons/icon.svg" />
    <link rel="stylesheet" href="/assets/css/app.css" />
  </head>
  <body>
    <main class="room-shell">
      <section class="card" id="join-card">
        <p id="room-name" class="eyebrow">Sala efímera</p>
        <h1>Entrar</h1>
        <p>Usa un mote temporal. No pedimos email ni teléfono.</p>

        <label for="nickname">Mote</label>
        <input id="nickname" autocomplete="nickname" maxlength="24" placeholder="Tu mote" />

        <label for="pin">PIN privado para salir</label>
        <div class="inline-control">
          <input id="pin" inputmode="numeric" maxlength="6" placeholder="PIN" />
          <button id="random-pin" class="secondary compact" type="button">🎲</button>
        </div>

        <label for="avatar">Avatar</label>
        <div id="avatar-picker" class="avatar-picker" role="listbox" aria-label="Elige avatar"></div>
        <input id="avatar" type="hidden" />

        <button id="join-room" type="button">Compartir ubicación</button>
        <p id="status" class="status" aria-live="polite"></p>
      </section>

      <section class="card" id="room-card" hidden>
        <p id="room-title" class="eyebrow">Sala</p>
        <h2>Grupo</h2>
        <div class="share-box">
          <input id="share-link" readonly />
          <button id="copy-link" class="secondary" type="button">Copiar enlace</button>
          <button id="native-share" class="secondary" type="button">Compartir</button>
        </div>
        <p id="room-status" class="status" aria-live="polite"></p>
        <div id="members" class="member-list"></div>
        <button id="leave-room" class="danger" type="button">Salir</button>
      </section>
    </main>

    <script src="/config.js"></script>
    <script type="module" src="/src/app.js"></script>
  </body>
</html>
