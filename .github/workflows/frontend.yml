name: Frontend CI

on:
  push:
    branches:
      - main
    paths:
      - "web/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    paths:
      - "web/**"
      - ".github/workflows/frontend.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run room store tests
        run: node ./src/room-store.test.mjs
